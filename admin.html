<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin - Export Registrations</title>
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            padding: 50px;
            text-align: center;
        }

        .btn {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        #message {
            margin-top: 20px;
            color: #333;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <h1>Admin Dashboard</h1>
    <p>Export all registrations to CSV.</p>

    <button id="exportBtn" class="btn">Download CSV</button>
    <p id="message"></p>

    <script>
        // --- SUPABASE CONFIGURATION ---
        const SUPABASE_URL = "YOUR_SUPABASE_URL";
        const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        // ------------------------------

        document.getElementById("exportBtn").addEventListener("click", async () => {
            const msg = document.getElementById("message");
            msg.textContent = "Fetching data...";
            msg.style.color = "black";

            try {
                const { data, error } = await supabaseClient
                    .from('registrations')
                    .select('*')
                    .order('created_at', { ascending: true });

                if (error) throw error;

                if (!data || data.length === 0) {
                    msg.textContent = "No registrations found.";
                    return;
                }

                // Convert to CSV
                const headers = Object.keys(data[0]);
                const csvRows = [];
                // Add header row
                csvRows.push(headers.join(','));

                // Add data rows
                for (const row of data) {
                    const values = headers.map(header => {
                        const escaped = ('' + (row[header] || '')).replace(/"/g, '""');
                        return `"${escaped}"`;
                    });
                    csvRows.push(values.join(','));
                }

                const csvString = csvRows.join('\n');
                const blob = new Blob([csvString], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.setAttribute('href', url);
                a.setAttribute('download', `registrations_${new Date().toISOString().slice(0, 10)}.csv`);
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);

                msg.textContent = `Successfully exported ${data.length} registrations.`;
                msg.style.color = "green";

            } catch (err) {
                console.error(err);
                msg.textContent = "Error: " + err.message;
                msg.style.color = "red";
            }
        });
    </script>
</body>

</html>
